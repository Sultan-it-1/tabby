<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMAH Pro - $100\%$ Auto-Correct Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0c0c0c; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 360px; background: #161616; padding: 20px; border-radius: 16px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; max-height: 90vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { background: #252525; border: 1px solid #444; color: #00ff00; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; text-decoration: none; font-weight: bold; }

        .scan-zone { border: 2px dashed #00ff0044; padding: 35px 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; background: #1a1a1a; }
        .scan-zone:hover { border-color: #00ff00; background: #1d2a1d; }
        .scan-zone p { margin: 0; font-size: 13px; color: #888; }

        .results { flex-grow: 1; overflow-y: auto; text-align: left; direction: ltr; padding-right: 5px; }
        .card { background: #000; border: 1px solid #222; border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; border-left: 4px solid #333; }
        .card.tabby-active { border-left-color: #ff74d2; background: #1e161b; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; display: block; margin-bottom: 6px; letter-spacing: 0.5px; text-align: right; }
        .value { font-family: 'Courier New', monospace; color: #00ff00; font-size: 14px; cursor: pointer; word-break: break-all; font-weight: bold; }

        .status-bar { font-size: 11px; margin-top: 15px; color: #00ff00; font-weight: bold; min-height: 18px; border-top: 1px solid #222; padding-top: 10px; }
        .badge { position: absolute; top: 10px; right: 10px; font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #00ff0022; color: #00ff00; border: 1px solid #00ff0044; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="index.html" class="nav-btn">🏠 الرئيسية</a>
        <span style="font-size: 13px; color: #fff; font-weight: bold;">TABBY AUTO-CORRECT</span>
    </div>

    <div class="scan-zone" id="dropZone">
        <p>الصق صورة التقرير هنا (Ctrl+V) أو اضغط للرفع</p>
        <span style="font-size: 10px; color: #555;">معالج ذكي لتصحيح خلط الحروف والأرقام البصرية</span>
    </div>

    <div id="results" class="results">
        <div style="color: #444; text-align: center; margin-top: 40px; font-size: 12px;">بانتظار صورة التقرير للتحقق الصارم المعزز...</div>
    </div>

    <div id="status" class="status-bar">منظومة فلترة وتصحيح الخانات مفعلة</div>
</div>

<script>
    const resultsArea = document.getElementById('results');
    const statusDiv = document.getElementById('status');
    const dropZone = document.getElementById('dropZone');

    document.addEventListener('paste', e => {
        const item = e.clipboardData.items[0];
        if (item && item.type.indexOf('image') !== -1) processImage(item.getAsFile());
    });

    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => processImage(e.target.files[0]);
        input.click();
    };

    async function processImage(file) {
        statusDiv.innerText = "جاري الفحص الدقيق والتحقق من سلامة الخانات... ⏳";
        resultsArea.innerHTML = '';
        
        try {
            const worker = await Tesseract.createWorker('eng+ara');
            // تقييد الوعي البصري فقط على المحارف المدعومة في نظام حسابات سمة
            await worker.setParameters({
                tesseract_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ/-:'
            });

            const { data: { text } } = await worker.recognize(file);
            await worker.terminate();

            parseAndFixTabbyReport(text);
        } catch (err) {
            statusDiv.innerText = "فشل في معالجة وفلترة الصورة بصرياً ❌";
        }
    }

    // خوارزمية هندسة تصحيح الخانات المتشابهة بصرياً (Visual Confusables Corrector)
    function cleanAndFixAccount(rawWord) {
        // تنظيف أولي لترك الحروف والأرقام فقط والتحويل لحروف كابيتال
        let cleaned = rawWord.replace(/[^A-Z0-9]/gi, '').toUpperCase();
        
        // خريطة استبدال الأخطاء الشائعة للهبد البصري (تعديل الحروف إلى أرقام حيث يُتوقع رقم)
        // إذا كان الحساب يحتوي على الغالبية العظمى من الأرقام، نقوم بتصحيح هفوات البكسل المتناثرة
        let digitsCount = (cleaned.match(/\d/g) || []).length;
        let lettersCount = cleaned.length - digitsCount;

        // إذا كان الحساب رقمياً بالكامل أو يحتوي على حروف قليلة جداً مشبوهة (مثل حساب تابي الـ 20 خانة الصافي)
        if (cleaned.length === 20 && lettersCount <= 4) {
            let fixed = "";
            for (let char of cleaned) {
                if (char === 'O' || char === 'D' || char === 'Q') fixed += '0';
                else if (char === 'I' || char === 'L' || char === 'T') fixed += '1';
                else if (char === 'Z') fixed += '2';
                else if (char === 'S') fixed += '5';
                else if (char === 'B') fixed += '8';
                else if (char === 'G') fixed += '6';
                else fixed += char;
            }
            return fixed;
        }

        // معالجة الحساب المدمج (مثل الحساب الـ 31 خانة)
        // نقوم بتصحيح التداخل الشائع فقط إذا التفتت الحروف والتبست (مثل T بدلاً من 9 في بعض الخطوط)
        if (cleaned.length === 31) {
            let fixed = "";
            // استبدال ذكي مبني على سياق خطوط تقارير سمة
            for (let i = 0; i < cleaned.length; i++) {
                let char = cleaned[i];
                // إذا ظهر حرف T وحيداً محاطاً بالأرقام، فغالباً هو رقم 9 تالف بكسلياً
                if (char === 'T' && i > 0 && i < 30 && /\d/.test(cleaned[i-1]) && /\d/.test(cleaned[i+1])) {
                    fixed += '9';
                } else if (char === 'O' && i > 0 && i < 30 && /\d/.test(cleaned[i-1]) && /\d/.test(cleaned[i+1])) {
                    fixed += '0';
                } else {
                    fixed += char;
                }
            }
            return fixed;
        }

        return cleaned;
    }

    function parseAndFixTabbyReport(text) {
        resultsArea.innerHTML = '';
        let activeCount = 0;

        const dateMatch = text.match(/(\d{4}[-\/]\d{2}[-\/]\d{2})|(\d{2}[-\/]\d{2}[-\/]\d{4})/);
        if (dateMatch) addCard("تاريخ التقرير / DATE", dateMatch[0]);

        let idFound = text.match(/\b([12]\d{9})\b/);
        let nationalID = idFound ? idFound[0] : "";
        if (nationalID) addCard("رقم الهوية / ID", nationalID);

        const sections = text.split(/(?=تابي|TABBY|شركة تابي للتمويل)/i);
        let foundAccounts = [];

        sections.forEach(section => {
            const isTabby = /تابي|TABBY/i.test(section);
            const isActive = /نشط|Active|منتظم|Regular/i.test(section) && !/مغلق|Closed|Default/i.test(section);

            if (isTabby && isActive) {
                const words = section.split(/[\s\n\r|:;,\/]+/);
                
                words.forEach(word => {
                    // تمرير الكلمة عبر خوارزمية التصحيح الذكي قبل فحص الطول الصارم
                    let correctedWord = cleanAndFixAccount(word);
                    
                    if (correctedWord.length === 20 || correctedWord.length === 31) {
                        if (correctedWord !== nationalID && !foundAccounts.includes(correctedWord)) {
                            if (/^[A-Z0-9]+$/.test(correctedWord) && !/^(.)\1+$/.test(correctedWord)) {
                                foundAccounts.push(correctedWord);
                                addCard("حساب تابي نشط / ACTIVE ACCOUNT", correctedWord, true);
                                activeCount++;
                            }
                        }
                    }
                });
            }
        });

        if (activeCount > 0) {
            statusDiv.innerText = `تم التحقق والتصحيح التلقائي لـ ${activeCount} حسابات بنجاح ✅`;
        } else {
            statusDiv.innerText = "لم يتم العثور على حسابات تابي مطابقة ومؤكدة ❌";
        }
    }

    function addCard(label, value, isTabby = false) {
        const div = document.createElement('div');
        div.className = `card ${isTabby ? 'tabby-active' : ''}`;
        if (isTabby) div.innerHTML += `<span class="badge">VERIFIED & FIXED</span>`;
        div.innerHTML += `
            <span class="label">${label}</span>
            <div class="value" onclick="copyValue('${value}')">${value}</div>
        `;
        resultsArea.appendChild(div);
    }

    function copyValue(val) {
        navigator.clipboard.writeText(val);
        const original = statusDiv.innerText;
        statusDiv.innerText = "تم نسخ الحساب الخالي من الأخطاء! 📋";
        setTimeout(() => statusDiv.innerText = original, 1200);
    }
</script>

</body>
</html>
