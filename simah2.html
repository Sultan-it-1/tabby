<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMAH Pro - Ultimate Precision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .app-container { width: 360px; background: #161616; padding: 20px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; max-height: 90vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-link { color: #00ff00; text-decoration: none; font-size: 11px; border: 1px solid #00ff00; padding: 4px 10px; border-radius: 5px; }
        .drop-area { border: 2px dashed #00ff0044; background: #1a1a1a; padding: 30px 10px; border-radius: 12px; cursor: pointer; text-align: center; }
        .results { margin-top: 20px; flex-grow: 1; overflow-y: auto; }
        .card { background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; position: relative; }
        .card .label { font-size: 10px; color: #666; display: block; margin-bottom: 5px; }
        .card .value { font-family: monospace; color: #00ff00; font-size: 13px; cursor: pointer; word-break: break-all; }
        .tabby-item { border-right: 3px solid #ff74d2; background: #1a1418; }
        .loader { display: none; margin: 10px auto; border: 3px solid #333; border-top: 3px solid #00ff00; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-msg { font-size: 11px; color: #00ff00; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="index.html" class="nav-link">🏠 الرئيسية</a>
        <span style="font-weight: bold; color: #fff; font-size: 13px;">SIMAH ULTIMATE</span>
    </div>

    <div class="drop-area" onclick="document.getElementById('fileInput').click()">
        <p id="fileName">اضغط لرفع تقرير سمة</p>
        <input type="file" id="fileInput" hidden accept="application/pdf" onchange="handleFile(this)">
    </div>

    <div class="loader" id="loader"></div>
    <div class="results" id="results"></div>
    <div class="status-msg" id="statusMsg">جاهز..</div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('fileName').innerText = file.name;

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                // دمج النصوص مع الحفاظ على هيكلية واضحة
                fullText += textContent.items.map(item => item.str).join(" ") + "\n";
            }
            parseSimahUltimate(fullText);
        } catch (err) {
            document.getElementById('statusMsg').innerText = "خطأ في المعالجة ❌";
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function parseSimahUltimate(text) {
        // 1. استخراج الهوية
        const idMatch = text.match(/\b([12]\d{9})\b/);
        const nationalID = idMatch ? idMatch[1] : null;
        if (nationalID) addResult("رقم الهوية", nationalID);

        // 2. استخراج تاريخ التقرير (من خانة التاريخ والوقت)
        // يبحث عن التاريخ المكون من 8-10 أرقام والذي يتبع كلمة الوقت/التاريخ
        const datePattern = /(?:التاريخ والوقت|Date and Time).{0,50}(\d{2}[-\/]\d{2}[-\/]\d{4}|\d{4}[-\/]\d{2}[-\/]\d{2})/i;
        const dateMatch = text.match(datePattern);
        if (dateMatch) addResult("تاريخ التقرير", dateMatch[1]);

        // 3. استخراج حسابات تابي
        // تقسيم النص بناءً على "تابي" أو "TABBY"
        const chunks = text.split(/(?=تابي|TABBY|شركة تابي)/gi);
        let found = false;

        chunks.forEach(chunk => {
            const isTabby = /تابي|TABBY/i.test(chunk);
            const isActive = /نشط|Active|منتظم|Regular|Current/i.test(chunk) && 
                           !/مغلق|Closed|Default|مسدد|Settled/i.test(chunk);

            if (isTabby && isActive) {
                // نبحث عن أي سلسلة أرقام طولها 20 أو 36 حتى لو كانت داخل نص
                // هذا الـ Regex يستخرج الأرقام فقط من أي كتلة نصية
                const numbers = chunk.match(/\d+/g) || [];
                numbers.forEach(num => {
                    if ((num.length === 20 || num.length === 36) && num !== nationalID) {
                        addResult("حساب تابي نشط", num, true);
                        found = true;
                    }
                });
            }
        });

        document.getElementById('statusMsg').innerText = found ? "تم الاستخراج بنجاح ✅" : "لم يتم العثور على حسابات تابي نشطة";
    }

    function addResult(label, value, isTabby = false) {
        const res = document.getElementById('results');
        const div = document.createElement('div');
        div.className = `card ${isTabby ? 'tabby-item' : ''}`;
        div.innerHTML = `<span class="label">${label}</span><div class="value" onclick="copyValue('${value}')">${value}</div>`;
        res.appendChild(div);
    }

    function copyValue(val) {
        navigator.clipboard.writeText(val);
        const s = document.getElementById('statusMsg');
        s.innerText = "تم النسخ: " + val;
        setTimeout(() => s.innerText = "جاهز..", 1200);
    }
</script>
</body>
</html>
