<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMAH OCR PDF - Ultimate Solver</title>
    <!-- مكتبات المعالجة البصرية والرقمية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0c0c0c; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 360px; background: #161616; padding: 20px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; max-height: 95vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { background: #252525; border: 1px solid #444; color: #00ff00; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; text-decoration: none; }
        .upload-area { border: 2px dashed #00ff0044; padding: 25px 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; background: #1a1a1a; text-align: center; }
        .results { flex-grow: 1; overflow-y: auto; text-align: left; direction: ltr; padding-right: 5px; }
        .card { background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; position: relative; border-left: 4px solid #333; }
        .card.tabby { border-left-color: #ff74d2; background: #1e161b; }
        .label { font-size: 10px; color: #666; display: block; margin-bottom: 4px; text-align: right; }
        .value { font-family: monospace; color: #00ff00; font-size: 13px; cursor: pointer; word-break: break-all; font-weight: bold; }
        .status-bar { font-size: 11px; color: #00ff00; font-weight: bold; border-top: 1px solid #222; padding-top: 10px; text-align: center; }
        canvas { display: none; } /* لإخفاء المعالجة الخلفية */
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="index.html" class="nav-btn">🏠 الرئيسية</a>
        <span style="font-size: 12px; color: #fff; font-weight: bold;">SIMAH OCR PDF</span>
    </div>

    <div class="upload-area" onclick="document.getElementById('pdfInput').click()">
        <p id="fileName" style="font-size: 12px; color: #888;">ارفع ملف سمة "المصور" (PDF)</p>
        <input type="file" id="pdfInput" hidden accept="application/pdf" onchange="startOcrProcess(event)">
    </div>

    <div id="results" class="results"></div>
    <div id="status" class="status-bar">جاهز للمعالجة البصرية</div>
    <canvas id="pdfCanvas"></canvas>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function startOcrProcess(event) {
        const file = event.target.files[0];
        if (!file) return;

        const resultsArea = document.getElementById('results');
        const status = document.getElementById('status');
        resultsArea.innerHTML = '';
        status.innerText = "جاري تحويل الصفحات لصور... ⏳";
        document.getElementById('fileName').innerText = file.name;

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let combinedOcrText = "";

            // معالجة كل صفحة على حدة (تحويلها لصورة ثم قراءتها)
            for (let i = 1; i <= pdf.numPages; i++) {
                status.innerText = `جاري مسح الصفحة (${i} من ${pdf.numPages})...`;
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 }); // دقة عالية
                const canvas = document.getElementById('pdfCanvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                // تشغيل Tesseract على صورة الصفحة الحالية
                const { data: { text } } = await Tesseract.recognize(canvas, 'ara+eng');
                combinedOcrText += text + "\n";
            }

            analyzeText(combinedOcrText);
        } catch (err) {
            status.innerText = "حدث خطأ أثناء المعالجة البصرية ❌";
            console.error(err);
        }
    }

    function analyzeText(rawText) {
        // تنظيف النص المستخرج بصرياً
        const text = rawText.replace(/[\s|]+/g, ' ');
        const resultsArea = document.getElementById('results');

        // 1. التاريخ (بجانب التاريخ والوقت)
        const dateMatch = text.match(/(?:التاريخ والوقت|Date and Time)[:\s]*(\d{2,4}[-\/]\d{2}[-\/]\d{2,4})/i);
        if (dateMatch) addCard("تاريخ التقرير", dateMatch[1]);

        // 2. الهوية
        const idMatch = text.match(/\b([12]\d{9})\b/);
        if (idMatch) addCard("رقم الهوية", idMatch[1]);

        // 3. حسابات تابي (20 أو 36 خانة)
        // البحث عن أي تسلسل (حروف وأرقام) بالطول المطلوب
        const tabbyRegex = /\b([A-Z0-9]{20}|[A-Z0-9]{36})\b/gi;
        const chunks = text.split(/حالة المنتج|Product Status/i);
        let found = false;

        chunks.forEach(chunk => {
            if (/تابي|TABBY/i.test(chunk) && /نشط|Active/i.test(chunk)) {
                let m;
                while ((m = tabbyRegex.exec(chunk)) !== null) {
                    if (m[1] !== (idMatch ? idMatch[1] : "")) {
                        addCard("حساب تابي نشط", m[1], true);
                        found = true;
                    }
                }
            }
        });

        document.getElementById('status').innerText = found ? "تم الاستخراج بصرياً بنجاح ✅" : "لم يتم العثور على حسابات نشطة";
    }

    function addCard(label, value, isTabby = false) {
        const div = document.createElement('div');
        div.className = `card ${isTabby ? 'tabby' : ''}`;
        div.innerHTML = `<span class="label">${label}</span><div class="value" onclick="copyValue('${value}')">${value}</div>`;
        document.getElementById('results').appendChild(div);
    }

    function copyValue(val) {
        navigator.clipboard.writeText(val);
        const s = document.getElementById('status');
        s.innerText = "تم النسخ: " + val;
        setTimeout(() => s.innerText = "جاهز..", 1200);
    }
</script>
</body>
</html>
