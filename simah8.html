<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMAH Pro - Tabby Multi-Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0c0c0c; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 360px; background: #161616; padding: 20px; border-radius: 16px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; max-height: 90vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { background: #252525; border: 1px solid #444; color: #00ff00; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; text-decoration: none; font-weight: bold; }

        .scan-zone { border: 2px dashed #00ff0044; padding: 30px 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; background: #1a1a1a; }
        .scan-zone:hover { border-color: #00ff00; background: #1d2a1d; }
        .scan-zone p { margin: 0; font-size: 13px; color: #888; }

        .results { flex-grow: 1; overflow-y: auto; text-align: left; direction: ltr; padding-right: 5px; }
        .card { background: #000; border: 1px solid #222; border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; border-left: 4px solid #333; }
        .card.tabby-active { border-left-color: #ff74d2; background: #1e161b; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; display: block; margin-bottom: 6px; letter-spacing: 0.5px; text-align: right; }
        .value { font-family: 'Courier New', monospace; color: #00ff00; font-size: 14px; cursor: pointer; word-break: break-all; font-weight: bold; }

        .status-bar { font-size: 11px; margin-top: 15px; color: #00ff00; font-weight: bold; min-height: 18px; border-top: 1px solid #222; padding-top: 10px; }
        .badge { position: absolute; top: 10px; right: 10px; font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #00ff0022; color: #00ff00; border: 1px solid #00ff0044; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="index.html" class="nav-btn">🏠 الرئيسية</a>
        <span style="font-size: 13px; color: #fff; font-weight: bold;">TABBY MULTI-SCAN</span>
    </div>

    <div class="scan-zone" id="dropZone">
        <p>قم بلصق الصورة أو اضغط للرفع</p>
        <span style="font-size: 10px; color: #555;">استخراج كافة الحسابات النشطة</span>
    </div>

    <div id="results" class="results">
        <div style="color: #444; text-align: center; margin-top: 40px; font-size: 12px;">بانتظار صورة التقرير...</div>
    </div>

    <div id="status" class="status-bar">جاهز للفحص المتعدد</div>
</div>

<script>
    const resultsArea = document.getElementById('results');
    const statusDiv = document.getElementById('status');
    const dropZone = document.getElementById('dropZone');

    document.addEventListener('paste', e => {
        const item = e.clipboardData.items[0];
        if (item && item.type.indexOf('image') !== -1) processImage(item.getAsFile());
    });

    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => processImage(e.target.files[0]);
        input.click();
    };

    async function processImage(file) {
        statusDiv.innerText = "جاري قراءة النص واستخراج الحسابات... ⏳";
        resultsArea.innerHTML = '';
        
        try {
            const { data: { text } } = await Tesseract.recognize(file, 'eng+ara', {
                logger: m => { if(m.status === 'recognizing text') statusDiv.innerText = `تحليل بصري: ${Math.round(m.progress * 100)}%`; }
            });
            parseTabbyReport(text);
        } catch (err) {
            statusDiv.innerText = "فشل في معالجة الصورة ❌";
        }
    }

    function parseTabbyReport(text) {
        // تنظيف النص من الرموز المزعجة التي تكسر الأرقام
        const cleanText = text.replace(/[|:;ـ]+/g, ' ').replace(/\s+/g, ' ');
        resultsArea.innerHTML = '';

        // 1. استخراج التاريخ (أول تاريخ يظهر غالباً هو تاريخ الإصدار)
        const dateMatch = cleanText.match(/(\d{4}[-\/]\d{2}[-\/]\d{2})|(\d{2}[-\/]\d{2}[-\/]\d{4})/);
        if (dateMatch) addCard("تاريخ الإصدار / REPORT DATE", dateMatch[0]);

        // 2. استخراج كافة حسابات تابي النشطة
        // تم استخدام تقسيم بناءً على كلمة تابي لضمان فحص كل منتج على حدة
        const sections = text.split(/(?=تابي|TABBY)/i);
        let activeCount = 0;
        let idFound = cleanText.match(/\b([12]\d{9})\b/);
        let nationalID = idFound ? idFound[0] : "";

        sections.forEach(section => {
            const isTabby = /تابي|TABBY/i.test(section);
            // البحث عن حالة النشاط في هذا القسم تحديداً
            const isActive = /نشط|Active|منتظم|Regular/i.test(section) && !/مغلق|Closed|Default|متعثر/i.test(section);

            if (isTabby && isActive) {
                // البحث عن سلاسل بطول 20 أو 36 خانة (حروف وأرقام)
                const tabbyRegex = /[A-Z0-9]{20,36}/gi;
                const matches = section.match(tabbyRegex);

                if (matches) {
                    matches.forEach(match => {
                        // فلترة النتائج: يجب أن يكون الطول بالضبط 20 أو 36 وليس رقم الهوية
                        if ((match.length === 20 || match.length === 36) && match !== nationalID) {
                            addCard("حساب تابي نشط / ACTIVE ACCOUNT", match, true);
                            activeCount++;
                        }
                    });
                }
            }
        });

        if (activeCount > 0) {
            statusDiv.innerText = `تم استخراج ${activeCount} حسابات نشطة ✅`;
        } else {
            statusDiv.innerText = "لم يتم العثور على حسابات تابي نشطة ❌";
        }
    }

    function addCard(label, value, isTabby = false) {
        const div = document.createElement('div');
        div.className = `card ${isTabby ? 'tabby-active' : ''}`;
        if (isTabby) div.innerHTML += `<span class="badge">ACTIVE</span>`;
        div.innerHTML += `
            <span class="label">${label}</span>
            <div class="value" onclick="copyValue('${value}')">${value}</div>
        `;
        resultsArea.appendChild(div);
    }

    function copyValue(val) {
        navigator.clipboard.writeText(val);
        const original = statusDiv.innerText;
        statusDiv.innerText = "تم نسخ الحساب: " + val;
        setTimeout(() => statusDiv.innerText = original, 1200);
    }
</script>

</body>
</html>
