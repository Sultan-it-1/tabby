<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scanner - Context Aware</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 340px; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .paste-zone { border: 2px dashed #444; padding: 15px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; color: #888; transition: 0.3s; }
        .paste-zone.active { border-color: #00ff00; background: #122212; color: #00ff00; }
        #output { background: #000; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 15px; color: #00ff00; border: 1px solid #222; margin-bottom: 12px; cursor: pointer; direction: ltr; min-height: 20px; }
        .chips-container { display: flex; justify-content: space-between; gap: 5px; direction: ltr; margin-bottom: 8px; }
        .chip { flex: 1; background: #252525; padding: 10px 2px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #333; color: #ccc; }
        .chip:hover { background: #333; border-color: #00ff00; color: #fff; }
        .gateway-chip { background: #1e1e1e; color: #00d4ff; border-color: #2c2c2c; }
        
        /* تنسيق زر القفل الجديد */
        .lock-container { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-bottom: 5px; padding: 0 5px; }
        .lock-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 18px; border: 1px solid #444; }
        .slider:before { position: absolute; content: "🔒"; font-size: 10px; height: 14px; width: 14px; left: 2px; bottom: 1px; transition: .4s; display: flex; align-items: center; justify-content: center; }
        input:checked + .slider { background-color: #00ff0022; border-color: #00ff00; }
        input:checked + .slider:before { content: "🌐"; transform: translateX(14px); }

        .status { font-size: 11px; margin-top: 10px; color: #00ff00; height: 15px; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #333; margin: 10px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="paste-zone" id="dropZone">اضغط هنا ثم الصق الصورة (Ctrl+V)</div>
    
    <div id="output" onclick="copyFull()">البيانات ستظهر هنا</div>
    
    <div class="chips-container">
        <div class="chip" id="chip-card" onclick="copyMe(this)">-</div>
        <div class="chip" id="chip-amount" onclick="copyMe(this)">-</div>
        <div class="chip" id="chip-time" onclick="copyMe(this)">-</div>
        <div class="chip" id="chip-date" onclick="copyMe(this)">-</div>
    </div>

    <hr>

    <!-- زر التحكم في فتح الروابط -->
    <div class="lock-container">
        <span class="lock-label">فتح الرابط تلقائياً؟</span>
        <label class="switch">
            <input type="checkbox" id="linkToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="chips-container">
        <div class="chip gateway-chip" onclick="openGateway('https://portal.noonpayments.com', 'noon normal')">Noon</div>
        <div class="chip gateway-chip" onclick="openGateway('https://portal.sa.noonpayments.com', 'noon sa')">Noon SA</div>
        <div class="chip gateway-chip" onclick="openGateway('https://dashboard.checkout.com', 'checkout')">Checkout</div>
        <div class="chip gateway-chip" onclick="openGateway('https://fort.payfort.com', 'pay fort')">Payfort</div>
    </div>

    <div id="status" class="status">جاهز.. التنسيق: DD-MM</div>
</div>

<script>
    const statusDiv = document.getElementById('status');
    const dropZone = document.getElementById('dropZone');
    const linkToggle = document.getElementById('linkToggle');

    async function secureCopy(text) {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch (err) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            const success = document.execCommand('copy');
            document.body.removeChild(textArea);
            return success;
        }
    }

    document.addEventListener('paste', async (e) => {
        const items = e.clipboardData.items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                processImage(items[i].getAsFile());
                break;
            }
        }
    });

    async function processImage(file) {
        statusDiv.innerText = "جاري القراءة... ⏳";
        dropZone.classList.add('active');
        try {
            const { data: { text } } = await Tesseract.recognize(file, 'eng+ara');
            parseData(text);
        } catch (err) {
            statusDiv.innerText = "خطأ في القراءة ❌";
        }
        dropZone.classList.remove('active');
    }

    function parseData(rawText) {
        const lines = rawText.split('\n');
        const cleanText = rawText.replace(/\s+/g, ' ');
        const amountMatch = cleanText.match(/\d{1,7}\.\d{2}/);
        const amount = amountMatch ? amountMatch[0] : "0.00";
        const timeMatch = cleanText.match(/\d{2}:\d{2}/);
        const time = timeMatch ? timeMatch[0] : "00:00";
        const dateMatch = cleanText.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/) || cleanText.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/);
        
        let date = "00-00";
        let foundYear = "";
        if (dateMatch) {
            if (dateMatch[1].length === 4) { 
                foundYear = dateMatch[1];
                date = `${parseInt(dateMatch[3])}-${parseInt(dateMatch[2])}`;
            } else { 
                foundYear = dateMatch[3];
                date = `${parseInt(dateMatch[1])}-${parseInt(dateMatch[2])}`;
            }
        }

        let card = "0000";
        const cardKeywords = ["بطاقة", "card", "mada", "مدى"];
        for (let line of lines) {
            if (cardKeywords.some(key => line.toLowerCase().includes(key))) {
                const match = line.match(/\d{4}/);
                if (match) { card = match[0]; break; }
            }
        }
        if (card === "0000") {
            const allFourDigits = cleanText.match(/\d{4}/g) || [];
            card = allFourDigits.find(d => d !== foundYear && !amount.includes(d) && d !== "2026" && d !== "2025") || "0000";
        }

        const finalResult = `${card} // ${amount} // ${time} // ${date}`;
        document.getElementById('output').innerText = finalResult;
        document.getElementById('chip-card').innerText = card;
        document.getElementById('chip-amount').innerText = amount;
        document.getElementById('chip-time').innerText = time;
        document.getElementById('chip-date').innerText = date;

        statusDiv.innerText = "تم الاستخراج والنسخ! ✅";
        secureCopy(finalResult);
    }

    function openGateway(url, name) {
        // إذا كان الزر مفعل، نفتح الرابط
        if (linkToggle.checked) {
            window.open(url, '_blank');
        }
        
        const msg = `Checking ${name} gateway`;
        secureCopy(msg).then(() => {
            statusDiv.innerText = (linkToggle.checked ? "فتح ونسخ: " : "نسخ فقط: ") + msg;
        });
    }

    function copyMe(element) {
        if (element.innerText === "-") return;
        secureCopy(element.innerText).then(() => {
            statusDiv.innerText = `نسخ: ${element.innerText}`;
        });
    }

    function copyFull() {
        const text = document.getElementById('output').innerText;
        if (text.includes("البيانات")) return;
        secureCopy(text).then(() => {
            statusDiv.innerText = "تم نسخ السطر كاملاً";
        });
    }
</script>

</body>
</html>
