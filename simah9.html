<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMAH AI PDF Extractor</title>
    <!-- مكتبة PDF.js لقراءة الملفات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0c0c0c; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 360px; background: #161616; padding: 20px; border-radius: 16px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; max-height: 90vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { background: #252525; border: 1px solid #444; color: #00ff00; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; text-decoration: none; font-weight: bold; }

        .upload-zone { border: 2px dashed #00ff0044; padding: 30px 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; background: #1a1a1a; }
        .upload-zone:hover { border-color: #00ff00; background: #1d2a1d; }
        .upload-zone p { margin: 0; font-size: 13px; color: #888; }

        .results { flex-grow: 1; overflow-y: auto; text-align: left; direction: ltr; padding-right: 5px; }
        .card { background: #000; border: 1px solid #222; border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; border-left: 4px solid #333; }
        .card.tabby-active { border-left-color: #ff74d2; background: #1e161b; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; display: block; margin-bottom: 6px; letter-spacing: 0.5px; text-align: right; }
        .value { font-family: 'Courier New', monospace; color: #00ff00; font-size: 14px; cursor: pointer; word-break: break-all; font-weight: bold; }

        .status-bar { font-size: 11px; margin-top: 15px; color: #00ff00; font-weight: bold; min-height: 18px; border-top: 1px solid #222; padding-top: 10px; }
        .badge { position: absolute; top: 10px; right: 10px; font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #00ff0022; color: #00ff00; border: 1px solid #00ff0044; }
        
        .loader { display: none; margin: 10px auto; border: 3px solid #333; border-top: 3px solid #00ff00; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="index.html" class="nav-btn">🏠 الرئيسية</a>
        <span style="font-size: 13px; color: #fff; font-weight: bold;">SIMAH AI PARSER</span>
    </div>

    <div class="upload-zone" onclick="document.getElementById('pdfInput').click()">
        <p id="fileName">ارفع ملف تقرير سمة البنكي (PDF)</p>
        <input type="file" id="pdfInput" hidden accept="application/pdf" onchange="processPDF(event)">
    </div>

    <div class="loader" id="loader"></div>
    <div id="results" class="results">
        <div style="color: #444; text-align: center; margin-top: 40px; font-size: 12px;">بانتظار ملف الـ PDF لتمشيطه بالـ AI...</div>
    </div>

    <div id="status" class="status-bar">محرك الـ AI جاهز للفحص الرقمي</div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function processPDF(event) {
        const file = event.target.files[0];
        if (!file) return;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('status').innerText = "جاري استخراج وتطهير أسطر البيانات... ⏳";
        document.getElementById('results').innerHTML = '';
        document.getElementById('fileName').innerText = file.name;

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let rawLines = [];

            // قراءة ذكية لجميع الصفحات واستخراج النصوص كـ أسطر منفصلة تماماً من الماتريكس
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                // تجميع العناصر التي تقع على نفس الارتفاع تقريباً لضمان استقرار السطر
                let linesMap = {};
                textContent.items.forEach(item => {
                    let y = Math.round(item.transform[5]); // إحداثيات الارتفاع الرأسي
                    if (!linesMap[y]) linesMap[y] = [];
                    linesMap[y].push(item);
                });

                // ترتيب الأسطر من الأعلى للأسفل، والكلمات من اليمين لليسار (أو العكس)
                let sortedY = Object.keys(linesMap).sort((a, b) => b - a);
                sortedY.forEach(y => {
                    let lineText = linesMap[y].sort((a, b) => a.transform[4] - b.transform[4]).map(item => item.str).join(" ");
                    if (lineText.trim().length > 0) rawLines.push(lineText);
                });
            }

            aiEngineParser(rawLines);
        } catch (err) {
            document.getElementById('status').innerText = "فشل المحرك في فتح الملف ❌";
            console.error(err);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    // محرك ذكاء اصطناعي محلي مبني على تحليل العلاقات السياقية بين الأسطر
    function aiEngineParser(lines) {
        const resultsArea = document.getElementById('results');
        resultsArea.innerHTML = '';

        let nationalID = "";
        let reportDate = "";
        let activeTabbyAccounts = [];

        // تنظيف أولي لكافة الأسطر من الرموز المعرقلة (مثل الفواصل والنقاط الملتصقة)
        const cleanedLines = lines.map(line => line.replace(/[|:;ـ\s]+/g, ' ').trim());

        // الخطوة 1: فحص واستدلال البيانات الأساسية (الهوية والتاريخ)
        cleanedLines.forEach(line => {
            // صيد التاريخ الذكي (المرتبط بكلمة إصدار أو تحديث أو وقت)
            if (/إصدار|تحديث|وقت|تاريخ|Date|Time/i.test(line)) {
                let dateMatch = line.match(/(\d{4}[-\/]\d{2}[-\/]\d{2})|(\d{2}[-\/]\d{2}[-\/]\d{4})/);
                if (dateMatch && !reportDate) {
                    reportDate = dateMatch[0];
                }
            }
            // صيد الهوية
            let idMatch = line.match(/\b([12]\d{9})\b/);
            if (idMatch && !nationalID) {
                nationalID = idMatch[1];
            }
        });

        // عرض البيانات الأساسية فوراً إذا وجدت
        if (reportDate) addCard("تاريخ التقرير / DATE", reportDate);
        if (nationalID) addCard("رقم الهوية / NATIONAL ID", nationalID);

        // الخطوة 2: تشغيل خوارزمية الـ Context Windows (النافذة السياقية) لصيد حسابات تابي
        // الخوارزمية تبحث في نطاق (15 سطر فوق وتحت) عند العثور على كلمة تابي للتأكد من ربطها بحالة "نشط"
        for (let i = 0; i < cleanedLines.length; i++) {
            let currentLine = cleanedLines[i];

            // إذا عثرنا على تابي
            if (/تابي|TABBY/i.test(currentLine)) {
                // نفتح نافذة سياقية حول السطر الحالي (تمشيط 20 سطر محيط)
                let contextWindow = cleanedLines.slice(Math.max(0, i - 5), Math.min(cleanedLines.length, i + 15)).join(" ");
                
                // تحقق الذكاء الاصطناعي: هل الحساب نشط حالياً؟ واستبعاد المغلق والمستقر والافتراضي
                let isProductActive = /نشط|Active|منتظم|Regular/i.test(contextWindow) && !/مغلق|Closed|Default|متعثر/i.test(contextWindow);

                if (isProductActive) {
                    // فحص شامل داخل هذه النافذة السياقية عن أرقام بطول 20 أو 36 خانة (حروف وأرقام)
                    let tabbyAccRegex = /\b([A-Z0-9]{20}|[A-Z0-9]{36})\b/gi;
                    let match;
                    while ((match = tabbyAccRegex.exec(contextWindow)) !== null) {
                        let potentialAccount = match[1];
                        // التأكد من عدم تكرار الحساب وعدم خلطه برقم الهوية
                        if (potentialAccount !== nationalID && !activeTabbyAccounts.includes(potentialAccount)) {
                            activeTabbyAccounts.push(potentialAccount);
                        }
                    }
                }
            }
        }

        // طباعة الحسابات النشطة المكتشفة
        activeTabbyAccounts.forEach(acc => {
            addCard("حساب تابي نشط / ACTIVE ACCOUNT", acc, true);
        });

        // تحديث شريط الحالة بنتيجة الفحص الذكي
        if (activeTabbyAccounts.length > 0) {
            document.getElementById('status').innerText = `ذكاء المحرك نجح في استخراج ${activeTabbyAccounts.length} حسابات نشطة ✅`;
        } else {
            document.getElementById('status').innerText = "تم الفحص بالـ AI: لا توجد حسابات تابي نشطة حالياً ❌";
        }
    }

    function addCard(label, value, isTabby = false) {
        const div = document.createElement('div');
        div.className = `card ${isTabby ? 'tabby-active' : ''}`;
        if (isTabby) div.innerHTML += `<span class="badge">ACTIVE</span>`;
        div.innerHTML += `
            <span class="label">${label}</span>
            <div class="value" onclick="copyValue('${value}')">${value}</div>
        `;
        document.getElementById('results').appendChild(div);
    }

    function copyValue(val) {
        navigator.clipboard.writeText(val);
        const s = document.getElementById('status');
        const old = s.innerText;
        s.innerText = "تم النسخ الذكي: " + val;
        setTimeout(() => s.innerText = old, 1200);
    }
</script>

</body>
</html>
