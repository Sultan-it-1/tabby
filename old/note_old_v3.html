<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Copy Pro - Secured & Maximized</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* الأبعاد الهندسية الصارمة للحاوية */
        .app-container { 
            width: 230px; 
            height: 300px; 
            background: #1a1a1a; 
            padding: 6px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            overflow: hidden;
        }
        
        /* الهيدر والأزرار العلوية */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; flex-shrink: 0; gap: 4px; }
        
        .nav-btn { background: #252525; border: 1px solid #444; color: #00ff00; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 2px; text-decoration: none; transition: 0.2s; }
        .nav-btn:hover { border-color: #00ff00; background: #122212; }

        .add-main-btn { background: #00ff0011; border: 1px solid #00ff00; color: #00ff00; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* منطقة المحتوى - نظام تمرير نحيف جداً */
        .content-scroll { flex-grow: 1; overflow-y: auto; padding-right: 2px; margin-top: 2px; }
        .content-scroll::-webkit-scrollbar { width: 3px; }
        .content-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        /* العناوين الجانبية للأقسام */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 4px 0 2px; border-right: 3px solid #00ff00; padding-right: 5px; }
        [dir="ltr"] .section-header { border-right: none; border-left: 3px solid #00ff00; padding-left: 5px; }
        .section-label { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: bold; }
        .del-section { color: #ff4444; cursor: pointer; font-size: 12px; margin-left: 3px; }
        
        /* شبكة المربعات */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 4px; }
        .chip { 
            background: #222; 
            padding: 9px 2px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid #444; 
            color: #fff; 
            text-align: center; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            user-select: none;
        }
        .chip:hover { border-color: #00ff00; background: #2a2a2a; }

        /* الأزرار السفلية */
        .backup-row { display: flex; gap: 4px; margin-top: auto; padding-top: 4px; border-top: 1px solid #333; flex-shrink: 0; }
        .backup-btn { flex: 1; background: #111; border: 1px solid #444; color: #aaa; padding: 5px; border-radius: 4px; font-size: 10px; cursor: pointer; white-space: nowrap; }

        .status { font-size: 10px; margin-top: 3px; color: #00ff00; height: 14px; font-weight: bold; text-align: center; flex-shrink: 0; }

        /* المودالات المتجاوبة المحدثة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100; padding: 10px; }
        .modal-content { background: #1a1a1a; padding: 10px; border-radius: 6px; width: 100%; max-width: 190px; border: 1px solid #00ff00; }
        input, textarea { width: 100%; background: #000; color: #00ff00; border: 1px solid #444; border-radius: 4px; padding: 7px; font-size: 12px; box-sizing: border-box; margin-bottom: 6px; font-family: sans-serif; }
        .modal-btns { display: flex; gap: 4px; }
        .m-btn { flex: 1; padding: 7px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-row">
        <a href="/" class="nav-btn">🏠 <span id="homeTxt">الرئيسية</span></a>
        <button class="add-main-btn" onclick="openSectionModal()">+ قسم</button>
        <button class="nav-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </div>

    <div id="main-content" class="content-scroll"></div>

    <div class="backup-row">
        <button class="backup-btn" onclick="exportData()">💾 نسخة</button>
        <button class="backup-btn" onclick="document.getElementById('importFile').click()">📂 استيراد</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div id="status" class="status">جاهز..</div>
</div>

<!-- مودال التعديل -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <input type="text" id="itemName" placeholder="الاسم المختصر">
        <textarea id="itemText" placeholder="النص الكامل..." rows="3"></textarea>
        <div class="modal-btns">
            <button class="m-btn" style="background:#00ff00;color:#000" onclick="saveItem()">حفظ</button>
            <button class="m-btn" style="background:#333;color:#fff" onclick="closeModal()">إلغاء</button>
        </div>
        <button id="delItemBtn" style="background:none;border:none;color:#ff4444;width:100%;margin-top:6px;cursor:pointer;font-size:11px; display:none;" onclick="deleteItem()">حذف 🗑️</button>
    </div>
</div>

<!-- مودال إضافة قسم -->
<div class="modal" id="sectionModal">
    <div class="modal-content">
        <input type="text" id="sectionName" placeholder="اسم القسم الجديد">
        <div class="modal-btns">
            <button class="m-btn" style="background:#00ff00;color:#000" onclick="addSection()">إضافة</button>
            <button class="m-btn" style="background:#333;color:#fff" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
    let currentLang = 'ar';
    let activeId = null, activeCat = null;
    const defaultData = { ar: { "عام": [{ id: 1, l: 'ترحيب', t: 'أهلاً بك، كيف أخدمك؟' }] }, en: { "General": [{ id: 2, l: 'Hello', t: 'How can I help you?' }] } };

    let storageData = JSON.parse(localStorage.getItem('copyGridDataV5')) || defaultData;

    // دالة مساعدة لضمان سلامة هيكلية البيانات في كل اللغات عند الحاجة
    function ensureLangSafety(lang) {
        if (!storageData) storageData = {};
        if (!storageData[lang]) storageData[lang] = {};
    }

    function render() {
        const container = document.getElementById('main-content');
        container.innerHTML = '';
        const isAr = currentLang === 'ar';
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
        document.getElementById('homeTxt').innerText = isAr ? 'الرئيسية' : 'Home';

        ensureLangSafety(currentLang);
        const sections = storageData[currentLang];
        for (let cat in sections) {
            const secHeader = document.createElement('div');
            secHeader.className = 'section-header';
            secHeader.innerHTML = `
                <div><span class="del-section" onclick="deleteSection('${cat}')">×</span> <span class="section-label">${cat}</span></div>
                <span style="color:#00ff00;cursor:pointer;font-weight:bold;font-size:14px" onclick="openItemModal('${cat}')">+</span>
            `;
            container.appendChild(secHeader);

            const grid = document.createElement('div');
            grid.className = 'grid-container';
            sections[cat].forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerText = item.l;
                
                chip.onclick = () => { 
                    navigator.clipboard.writeText(item.t); 
                    showStatus(isAr ? "تم النسخ! ✅" : "Copied! ✅"); 
                };
                
                chip.oncontextmenu = (e) => { 
                    e.preventDefault(); 
                    openItemModal(cat, item); 
                };
                
                grid.appendChild(chip);
            });
            container.appendChild(grid);
        }
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (x) => {
            try {
                const imported = JSON.parse(x.target.result);
                ['ar', 'en'].forEach(lang => {
                    if (imported[lang]) {
                        ensureLangSafety(lang);
                        for (let cat in imported[lang]) {
                            if (!storageData[lang][cat]) storageData[lang][cat] = [];
                            let existing = storageData[lang][cat].map(i => i.l);
                            
                            imported[lang][cat].forEach(newItem => {
                                let finalLabel = newItem.l;
                                let c = 1;
                                while (existing.includes(finalLabel)) {
                                    finalLabel = `${newItem.l} (${lang === 'ar' ? 'نسخة' : 'Copy'} ${c})`;
                                    c++;
                                }
                                storageData[lang][cat].push({ id: Date.now() + Math.random(), l: finalLabel, t: newItem.t });
                                existing.push(finalLabel);
                            });
                        }
                    }
                });
                saveAndRefresh();
                showStatus(currentLang === 'ar' ? "تم الدمج! 📂" : "Imported! 📂");
            } catch (err) { alert(currentLang === 'ar' ? "خطأ في الملف!" : "Invalid file!"); }
        };
        reader.readAsText(file);
        e.target.value = '';
    }

    function showStatus(msg) {
        const s = document.getElementById('status');
        s.innerText = msg;
        setTimeout(() => s.innerText = (currentLang === 'ar' ? "جاهز.." : "Ready.."), 1500);
    }

    function openSectionModal() { 
        document.getElementById('sectionName').value = '';
        document.getElementById('sectionModal').style.display = 'flex'; 
    }
    
    function addSection() {
        const name = document.getElementById('sectionName').value.trim();
        if (name) { 
            ensureLangSafety(currentLang);
            if (!storageData[currentLang][name]) {
                storageData[currentLang][name] = []; 
                saveAndRefresh(); 
            }
            closeModal(); 
        }
    }
    
    function deleteSection(cat) { 
        ensureLangSafety(currentLang);
        const msg = currentLang === 'ar' ? `حذف قسم "${cat}"؟` : `Delete section "${cat}"?`;
        if (confirm(msg)) { delete storageData[currentLang][cat]; saveAndRefresh(); } 
    }

    function openItemModal(cat, item = null) {
        activeCat = cat; 
        activeId = item ? item.id : null;
        document.getElementById('itemName').value = item ? item.l : '';
        document.getElementById('itemText').value = item ? item.t : '';
        document.getElementById('delItemBtn').style.display = item ? 'block' : 'none';
        document.getElementById('editModal').style.display = 'flex';
    }
    
    function saveItem() {
        const l = document.getElementById('itemName').value.trim(), t = document.getElementById('itemText').value.trim();
        if (!l || !t) return;
        ensureLangSafety(currentLang);
        
        if (activeId) { 
            let i = storageData[currentLang][activeCat].find(x => x.id === activeId); 
            if(i) { i.l = l; i.t = t; }
        } else { 
            // استخدام معرف عشوائي فريد لمنع تكرار المعرفات المطلق
            storageData[currentLang][activeCat].push({ id: Date.now() + Math.random(), l, t }); 
        }
        saveAndRefresh(); closeModal();
    }
    
    function deleteItem() { 
        ensureLangSafety(currentLang);
        const msg = currentLang === 'ar' ? 'حذف؟' : 'Delete?';
        if (confirm(msg)) { 
            storageData[currentLang][activeCat] = storageData[currentLang][activeCat].filter(x => x.id !== activeId); 
            saveAndRefresh(); closeModal(); 
        } 
    }

    function closeModal() { 
        document.querySelectorAll('.modal').forEach(m => m.style.display='none'); 
        activeCat = null;
        activeId = null;
    }
    
    function saveAndRefresh() { localStorage.setItem('copyGridDataV5', JSON.stringify(storageData)); render(); }
    function toggleLang() { currentLang = (currentLang === 'ar' ? 'en' : 'ar'); render(); }
    
    function exportData() {
        const blob = new Blob([JSON.stringify(storageData, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `backup_${Date.now()}.json`;
        a.click();
    }

    render();
</script>
</body>
</html>
