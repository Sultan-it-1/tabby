<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النوتات - الملاحظات السريعة</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-green: var(--accent-green);
            --accent-red: #ff3333;
            --text: #eee;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 230px;
            height: 300px;
            box-sizing: border-box;
            padding: 10px;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 14px;
            color: var(--accent-green);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px color-mix(in srgb, var(--accent-green) 20%, transparent);
            text-align: center;
            flex-grow: 1;
            padding-left: 20px;
            /* Offset to perfectly center visually */
        }

        .nav-btn {
            background: #252525;
            border: 1px solid #444;
            color: var(--accent-green);
            padding: 3px 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: #122212;
            border-color: var(--accent-green);
        }

        .note-area {
            flex-grow: 1;
            margin: 8px 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            color: var(--text);
            font-size: 11px;
            resize: none;
            outline: none;
            font-family: inherit;
            line-height: 1.4;

            /* التعديل السحري لحل مشكلة اتجاه المؤشر والنصوص بشكل ديناميكي كامل */
            text-align: start;
            unicode-bidi: plaintext;
        }

        .note-area:focus {
            border-color: var(--accent-green);
        }

        /* تنسيق شريط التمرير للنوتة */
        .note-area::-webkit-scrollbar {
            width: 3px;
        }

        .note-area::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        .btn {
            flex: 1;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-clear {
            border-color: rgba(255, 51, 51, 0.3);
        }

        .btn-clear:hover {
            background: #251515;
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .btn-copy:hover {
            background: #152515;
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .footer {
            margin-top: 5px;
            font-size: 8px;
            color: #555;
            border-top: 1px solid #1a1a1a;
            padding-top: 6px;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* ====== شريط التبويبات ====== */
        .tabs-bar {
            display: flex;
            align-items: center;
            gap: 3px;
            overflow-x: auto;
            flex-shrink: 0;
            margin-bottom: 4px;
            padding-bottom: 2px;
            scrollbar-width: none;
        }
        .tabs-bar::-webkit-scrollbar { display: none; }
        .tab-pill {
            font-size: 8px;
            padding: 2px 7px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #777;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.15s;
            max-width: 64px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .tab-pill.active {
            background: #0a1a0a;
            border-color: var(--accent-green);
            color: var(--accent-green);
            font-weight: bold;
        }
        .tab-pill .tab-del {
            font-size: 8px;
            color: #444;
            cursor: pointer;
            flex-shrink: 0;
        }
        .tab-pill .tab-del:hover { color: #ff4444; }
        .tab-add-btn {
            font-size: 11px;
            background: #1a1a1a;
            border: 1px dashed #333;
            color: #555;
            border-radius: 10px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.15s;
        }
        .tab-add-btn:hover { color: var(--accent-green); border-color: var(--accent-green); background: #0a1a0a; }
    </style>
    <!-- Centralized Cache Busting Loader -->
    <script>
        document.write('<script src="version.js?v=' + Date.now() + '"><\/script>');
    </script>
    <script>
        document.write('<script src="settings.js?v=' + (typeof APP_VERSION !== 'undefined' ? APP_VERSION : '1.0.0') + '"><\/script>');
    </script>
</head>

<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="nav-btn" title="الرئيسية" style="padding: 4px 6px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
            <h1>Sticky Notes</h1>
        </div>

        <!-- شريط التبويبات -->
        <div class="tabs-bar" id="tabsBar"></div>

        <!-- ساحة كتابة الملاحظات مع دعم الاتجاه التلقائي للمؤشر والنص -->
        <textarea id="stickyNote" class="note-area" dir="auto"
            placeholder="اكتب ملاحظاتك هنا... سيتم حفظها تلقائياً"></textarea>

        <!-- أزرار التحكم -->
        <div class="actions">
            <button onclick="clearNote()" class="btn btn-clear">
                <span>🗑️</span> مسح
            </button>
            <button onclick="copyNote()" class="btn btn-copy">
                <span>📋</span> نسخ
            </button>
        </div>

        <!-- هنا تظهر العبارات المتغيرة -->
        <div id="dynamicFooter" class="footer">
            Toolkit
        </div>
    </div>

    <script>
        document.write('<script src="sticky.js?v=' + (typeof APP_VERSION !== 'undefined' ? APP_VERSION : '1.0.0') + '"><\/script>');
    </script>

</body>

</html>
