<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMAH Pro Extractor - Precise Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .app-container { width: 360px; background: #161616; padding: 20px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; max-height: 90vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-link { color: #00ff00; text-decoration: none; font-size: 11px; border: 1px solid #00ff00; padding: 4px 10px; border-radius: 5px; font-weight: bold; }

        .drop-area { border: 2px dashed #00ff0044; background: #1a1a1a; padding: 30px 10px; border-radius: 12px; cursor: pointer; transition: 0.3s; text-align: center; }
        .drop-area:hover { border-color: #00ff00; background: #1d2a1d; }
        .drop-area p { margin: 0; font-size: 13px; color: #aaa; }

        .results { margin-top: 20px; flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .card { background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; position: relative; transition: 0.3s; }
        .card:hover { border-color: #00ff00; }
        .card .label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .card .value { font-family: 'Courier New', monospace; color: #00ff00; font-size: 13px; cursor: pointer; word-break: break-all; line-height: 1.4; }
        
        .tabby-item { border-right: 3px solid #ff74d2; background: #1a1418; }
        .status-badge { position: absolute; top: 10px; left: 10px; font-size: 8px; padding: 2px 6px; border-radius: 4px; background: #00ff0022; color: #00ff00; border: 1px solid #00ff0044; font-weight: bold; }

        .loader { display: none; margin: 10px auto; border: 3px solid #333; border-top: 3px solid #00ff00; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-msg { font-size: 11px; color: #00ff00; text-align: center; margin-top: 10px; min-height: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="index.html" class="nav-link">🏠 الرئيسية</a>
        <span style="font-weight: bold; color: #fff; font-size: 13px; letter-spacing: 1px;">SIMAH EXTRACTOR</span>
    </div>

    <div class="drop-area" onclick="document.getElementById('fileInput').click()">
        <p id="fileName">رفع تقرير سمة (PDF)</p>
        <input type="file" id="fileInput" hidden accept="application/pdf" onchange="handleFile(this)">
    </div>

    <div class="loader" id="loader"></div>

    <div class="results" id="results"></div>

    <div class="status-msg" id="statusMsg">جاهز للفحص (دقة 20/36 خانة)</div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function handleFile(input) {
        const file = input.files[0];
        if (!file) return;

        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMsg');
        const resultsArea = document.getElementById('results');

        loader.style.display = 'block';
        statusMsg.innerText = "جاري قراءة تقرير سمة...";
        resultsArea.innerHTML = '';
        document.getElementById('fileName').innerText = file.name;

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(" ") + "\n";
            }

            parseSimahPrecise(fullText);
        } catch (err) {
            statusMsg.innerText = "خطأ في معالجة الملف ❌";
        } finally {
            loader.style.display = 'none';
        }
    }

    function parseSimahPrecise(text) {
        // 1. استخراج الهوية
        const idMatch = text.match(/\b([12]\d{9})\b/);
        if (idMatch) addResult("رقم الهوية", idMatch[1]);

        // 2. استخراج تاريخ التقرير
        const dateMatch = text.match(/(\d{2}[-\/]\d{2}[-\/]\d{4})|(\d{4}[-\/]\d{2}[-\/]\d{2})/);
        if (dateMatch) addResult("تاريخ الإصدار", dateMatch[0]);

        // 3. تحليل منتجات تابي النشطة فقط
        // تقسيم النص لمقاطع بناءً على كلمة تابي
        const segments = text.split(/(?=TABBY|تابي|شركة تابي)/gi);
        let found = false;

        segments.forEach(segment => {
            const isTabby = /TABBY|تابي/i.test(segment);
            // التأكد من أن الحالة "نشط" وعدم وجود علامات إغلاق أو تعثر
            const isActive = (/نشط|Active|منتظم|Regular|Current/i.test(segment)) && 
                           !(/مغلق|Closed|Default|متعثر|Settled|مسدد/i.test(segment));

            if (isTabby && isActive) {
                // البحث عن أرقام الحسابات (فقط 20 أو 36 خانة)
                // نستخدم Regex يبحث عن سلاسل رقمية أو أبجدية رقمية بطول محدد
                const accRegex = /\b([A-Z0-9]{20}|[A-Z0-9]{36})\b/gi;
                let match;
                while ((match = accRegex.exec(segment)) !== null) {
                    addResult("حساب تابي نشط", match[1], true);
                    found = true;
                }
            }
        });

        const statusMsg = document.getElementById('statusMsg');
        if (!found) {
            statusMsg.innerText = "تم الفحص: لم يتم العثور على حسابات نشطة";
        } else {
            statusMsg.innerText = "تم استخراج البيانات بنجاح ✅";
        }
    }

    function addResult(label, value, isTabby = false) {
        const resultsArea = document.getElementById('results');
        const card = document.createElement('div');
        card.className = `card ${isTabby ? 'tabby-item' : ''}`;
        if (isTabby) card.innerHTML += `<span class="status-badge">ACTIVE</span>`;

        card.innerHTML += `
            <span class="label">${label}</span>
            <div class="value" onclick="copyValue('${value}')">${value}</div>
        `;
        resultsArea.appendChild(card);
    }

    function copyValue(val) {
        navigator.clipboard.writeText(val);
        const statusMsg = document.getElementById('statusMsg');
        const original = statusMsg.innerText;
        statusMsg.innerText = "تم النسخ بنجاح! 📋";
        setTimeout(() => statusMsg.innerText = original, 1200);
    }
</script>
</body>
</html>
