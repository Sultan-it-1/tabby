<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 320px; border: 1px solid #333; }
        .upload-area { border: 2px dashed #444; padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .upload-area:hover { border-color: #4CAF50; background: #252525; }
        #output { background: #000; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1em; color: #40ff40; border: 1px solid #222; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .loader { font-size: 12px; color: #888; margin-top: 10px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h3>الماسح الذكي 🤖</h3>
    <label class="upload-area" id="dropZone">
        اضغط هنا أو اسحب الصورة<br><small>(JPG, PNG)</small>
        <input type="file" id="imageInput" accept="image/*">
    </label>
    
    <div id="loader" class="loader">جاهز للعمل...</div>
    <div id="output">البيانات ستظهر هنا</div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const outputDiv = document.getElementById('output');
    const loader = document.getElementById('loader');

    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        loader.innerText = "جاري القراءة بذكاء... 🧠";
        outputDiv.innerText = "...";

        // تشغيل محرك الـ AI
        Tesseract.recognize(file, 'eng+ara')
            .then(({ data: { text } }) => {
                const cleanedText = text.replace(/\n/g, ' ');
                extractSmartData(cleanedText);
            })
            .catch(err => {
                loader.innerText = "فشل في معالجة الصورة";
            });
    });

    function extractSmartData(text) {
        // منطق ذكي للبحث عن الأرقام والتواريخ مهما تغير الترتيب
        
        // 1. البحث عن التاريخ (يأخذ آخر تاريخ يظهر في الرسالة)
        const dateMatch = text.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/) || text.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
        let dateStr = "0-0";
        if (dateMatch) {
            // استخراج الشهر واليوم بذكاء
            dateStr = dateMatch[1].length === 4 ? `${parseInt(dateMatch[2])}-${parseInt(dateMatch[3])}` : `${parseInt(dateMatch[2])}-${parseInt(dateMatch[1])}`;
        }

        // 2. البحث عن الوقت
        const timeMatch = text.match(/(\d{1,2}:\d{2}(?::\d{2})?)/);
        const timeStr = timeMatch ? timeMatch[0].substring(0, 5) : "00:00";

        // 3. البحث عن المبلغ (يبحث عن رقم عشري بجانبه كلمة SAR أو مبلغ)
        const amountMatch = text.match(/(\d+\.\d{2})/) || text.match(/(\d+\.\d{1,2})/);
        const amountStr = amountMatch ? amountMatch[0] : "0.00";

        // 4. البحث عن رقم البطاقة (يبحث عن 4 أرقام مسبوقة بـ * أو كلمة Card/بطاقة)
        const cardMatch = text.match(/(\d{4})(?!\d)/g);
        const cardStr = cardMatch ? cardMatch[cardMatch.length - 1] : "0000";

        // التنسيق النهائي المطلوب
        const result = `${dateStr} // ${timeStr} // ${amountStr} // ${cardStr}`;
        
        outputDiv.innerText = result;
        loader.innerText = "تم النسخ تلقائياً! ✅";
        
        // نسخ للذاكرة فوراً
        navigator.clipboard.writeText(result);
    }
</script>

</body>
</html>
