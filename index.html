<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأدوات الذكية - الرئيسية</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-green: #00ff00;
            --accent-blue: #00d4ff;
            --text: #eee;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 360px; /* تم تصغير عرض الحاوية لتناسب المربعات الأصغر */
            padding: 20px;
        }

        .header h1 {
            font-size: 22px; /* تصغير عنوان الصفحة قليلاً */
            color: var(--accent-green);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .header p {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px; /* تقليل الفراغ بين المربعات */
        }

        .menu-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px; /* تصغير زوايا الانحناء ليناسب الحجم الجديد */
            padding: 15px 20px; /* تم تقليل الـ Padding لتصغير المربع (كان 25px) */
            text-decoration: none;
            color: var(--text);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .menu-item:hover {
            transform: translateY(-3px); /* تقليل قفزة الهوفر لتناسب الحجم الصغير */
            border-color: var(--accent-green);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
        }

        .menu-item.card-tool:hover {
            border-color: var(--accent-blue);
        }

        .icon {
            font-size: 28px; /* تصغير حجم الأيقونة (كان 40px) */
            margin-bottom: 8px; /* تقليل المسافة أسفل الأيقونة */
        }

        .title {
            font-size: 15px; /* تصغير حجم عنوان المربع (كان 18px) */
            font-weight: bold;
            margin-bottom: 5px;
        }

        .desc {
            font-size: 11px; /* تصغير حجم الوصف (كان 12px) */
            color: #888;
            line-height: 1.4;
        }

        /* تأثير النيون الخفي عند الهوفر */
        .menu-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 0, 0.05), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .menu-item:hover::after {
            transform: translateX(100%);
        }

        .footer {
            margin-top: 30px;
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>FAST TOOLKIT</h1>
            <p>اختر الأداة المطلوبة للبدء</p>
        </div>

        <div class="menu-grid">
            <!-- رابط أداة النوتات -->
            <a href="note.html" class="menu-item">
                <div class="icon">📝</div>
                <div class="title">نظام النوتات الذكي</div>
                <div class="desc">إدارة ونسخ نصوص خدمة العملاء والاختصارات الجاهزة بضغطة واحدة.</div>
            </a>

            <!-- رابط أداة الـ Scanner/Card -->
            <a href="card.html" class="menu-item card-tool">
                <div class="icon">🔍</div>
                <div class="title">ماسح البيانات (Scanner)</div>
                <div class="desc">استخراج بيانات البطاقات، المبالغ، والوقت من الصور تلقائياً.</div>
            </a>
        </div>

        <div class="footer">
            SMART WORKFLOW ENGINE &copy; 2026
        </div>
    </div>

</body>
</html>
