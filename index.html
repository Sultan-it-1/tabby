<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأدوات الذكية - الرئيسية</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-green: #00ff00;
            --accent-blue: #00d4ff;
            --accent-yellow: #ffcc00;
            --text: #eee;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* تثبيت أبعاد الصندوق بالكامل حسب طلبك 230 عرض في 300 ارتفاع */
        .container {
            text-align: center;
            width: 230px;
            height: 300px;
            box-sizing: border-box;
            padding: 10px;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        .header h1 {
            font-size: 14px;
            color: var(--accent-green);
            margin: 2px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.2);
        }

        .header p {
            color: #666;
            font-size: 9px;
            margin: 0 0 8px 0;
        }

        /* قائمة الأدوات مع ميزة تمرير ذكي مرن يناسب الأبعاد الجديدة */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 2px;
        }

        /* تخصيص شكل شريط التمرير ليكون مخفي ونحيف جداً */
        .menu-grid::-webkit-scrollbar {
            width: 3px;
        }
        .menu-grid::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .menu-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            text-decoration: none;
            color: var(--text);
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: right;
            position: relative;
        }

        .menu-item:hover {
            transform: translateX(-2px);
            border-color: var(--accent-green);
            background: #1f1f1f;
        }

        .menu-item.simah-tool:hover { border-color: var(--accent-yellow); }
        .menu-item.card-tool:hover { border-color: var(--accent-blue); }

        .icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .text-wrapper {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .title {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .desc {
            font-size: 8px;
            color: #666;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer {
            margin-top: 5px;
            font-size: 8px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>FAST TOOLKIT</h1>
            <p>اختر الأداة المطلوبة للبدء</p>
        </div>

        <div class="menu-grid">
            <!-- نظام النوتات الذكي -->
            <a href="note.html" class="menu-item">
                <div class="icon">📝</div>
                <div class="text-wrapper">
                    <div class="title">نظام النوتات الذكي</div>
                    <div class="desc">إدارة ونسخ نصوص واختصارات العملاء بضغطة.</div>
                </div>
            </a>

            <!-- مستخرج حسابات سمة -->
            <a href="simah.html" class="menu-item simah-tool">
                <div class="icon">📊</div>
                <div class="text-wrapper">
                    <div class="title">حسابات سمة (SIMAH)</div>
                    <div class="desc">استخراج وتدقيق الحسابات وتلوين الخانات المشبوهة.</div>
                </div>
            </a>

            <!-- ماسح البيانات -->
            <a href="card.html" class="menu-item card-tool">
                <div class="icon">🔍</div>
                <div class="text-wrapper">
                    <div class="title">ماسح البيانات (Scanner)</div>
                    <div class="desc">استخراج بيانات البطاقات والمبالغ من الصور تلقائياً.</div>
                </div>
            </a>
        </div>

        <div class="footer">
            SMART WORKFLOW ENGINE &copy; 2026
        </div>
    </div>

</body>
</html>
