<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Scanner - Mini</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 320px; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .paste-zone { border: 2px dashed #444; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; color: #888; }
        .paste-zone.active { border-color: #00ff00; background: #122212; }
        #output { background: #000; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 14px; color: #00ff00; border: 1px solid #222; margin-bottom: 10px; cursor: pointer; }
        .chips-container { display: flex; justify-content: space-between; gap: 5px; }
        .chip { flex: 1; background: #333; padding: 8px 2px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.2s; border: 1px solid #444; overflow: hidden; text-overflow: ellipsis; }
        .chip:hover { background: #444; border-color: #00ff00; }
        .chip:active { background: #00ff00; color: #000; }
        .status { font-size: 11px; margin-top: 8px; color: #666; height: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="paste-zone" id="dropZone">اضغط هنا ثم الصق (Ctrl+V)</div>
    
    <div id="output" onclick="copyFull()">0-0 // 00:00 // 0.00 // 0000</div>
    
    <div class="chips-container">
        <div class="chip" id="chip-date" onclick="copyMe(this)">-</div>
        <div class="chip" id="chip-time" onclick="copyMe(this)">-</div>
        <div class="chip" id="chip-amount" onclick="copyMe(this)">-</div>
        <div class="chip" id="chip-card" onclick="copyMe(this)">-</div>
    </div>
    
    <div id="status" class="status">جاهز..</div>
</div>

<script>
    const outputDiv = document.getElementById('output');
    const statusDiv = document.getElementById('status');
    const dropZone = document.getElementById('dropZone');

    document.addEventListener('paste', async (e) => {
        const items = e.clipboardData.items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                processImage(items[i].getAsFile());
                break;
            }
        }
    });

    async function processImage(file) {
        statusDiv.innerText = "جاري التحليل... ⏳";
        dropZone.classList.add('active');
        const { data: { text } } = await Tesseract.recognize(file, 'eng+ara');
        parseData(text);
        dropZone.classList.remove('active');
    }

    function parseData(text) {
        const cleanText = text.replace(/\s+/g, ' ');
        const card = (cleanText.match(/\d{4}/g) || ["0000"]).pop();
        const amount = (cleanText.match(/\d+\.\d{2}/) || ["0.00"])[0];
        const time = (cleanText.match(/\d{2}:\d{2}/) || ["00:00"])[0];
        const dateMatch = cleanText.match(/(\d{4})-(\d{2})-(\d{2})/) || cleanText.match(/(\d{2})-(\d{2})-(\d{4})/);
        
        let date = "0-0";
        if (dateMatch) {
            date = dateMatch[1].length === 4 ? `${parseInt(dateMatch[2])}-${parseInt(dateMatch[3])}` : `${parseInt(dateMatch[2])}-${parseInt(dateMatch[1])}`;
        }

        // تحديث النتيجة الكلية
        outputDiv.innerText = `${date} // ${time} // ${amount} // ${card}`;
        
        // تحديث المربعات الصغيرة
        document.getElementById('chip-date').innerText = date;
        document.getElementById('chip-time').innerText = time;
        document.getElementById('chip-amount').innerText = amount;
        document.getElementById('chip-card').innerText = card;

        statusDiv.innerText = "تم الاستخراج! اضغط للنسخ ✅";
        navigator.clipboard.writeText(outputDiv.innerText);
    }

    function copyMe(element) {
        navigator.clipboard.writeText(element.innerText);
        statusDiv.innerText = `تم نسخ: ${element.innerText}`;
    }

    function copyFull() {
        navigator.clipboard.writeText(outputDiv.innerText);
        statusDiv.innerText = "تم نسخ السطر كاملاً";
    }
</script>

</body>
</html>
