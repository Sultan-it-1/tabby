<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Copy Pro - Fixed Size</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* ضبط الأبعاد الهندسية الدقيقة للحاوية */
        .app-container { 
            width: 230px; 
            height: 300px; 
            background: #1a1a1a; 
            padding: 8px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            overflow: hidden;
        }
        
        /* الهيدر مع الأزرار */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-shrink: 0; gap: 4px; }
        
        .nav-btn { background: #252525; border: 1px solid #444; color: #00ff00; padding: 3px 5px; border-radius: 4px; cursor: pointer; font-size: 10px; display: flex; align-items: center; gap: 2px; text-decoration: none; transition: 0.2s; }
        .nav-btn:hover { border-color: #00ff00; background: #122212; }

        .add-main-btn { background: #00ff0011; border: 1px solid #00ff00; color: #00ff00; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }

        /* نظام التمرير الذكي النحيف */
        .content-scroll { flex-grow: 1; overflow-y: auto; padding-right: 2px; margin-top: 4px; }
        .content-scroll::-webkit-scrollbar { width: 2px; }
        .content-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 6px 0 4px; border-right: 2px solid #00ff00; padding-right: 5px; }
        [dir="ltr"] .section-header { border-right: none; border-left: 2px solid #00ff00; padding-left: 5px; }
        .section-label { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; }
        .del-section { color: #ff4444; cursor: pointer; font-size: 11px; margin-left: 3px; }
        
        /* شبكة أزرار متناسقة للمساحة الصغيرة */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 6px; }
        .chip { background: #222; padding: 6px 2px; border-radius: 4px; font-size: 9px; font-weight: bold; cursor: pointer; border: 1px solid #333; color: #ccc; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; }
        .chip:hover { border-color: #00ff00; color: #fff; background: #2a2a2a; }

        /* أزرار النسخ الاحتياطي السفلية */
        .backup-row { display: flex; gap: 4px; margin-top: auto; padding-top: 6px; border-top: 1px solid #333; flex-shrink: 0; }
        .backup-btn { flex: 1; background: #111; border: 1px solid #444; color: #888; padding: 4px; border-radius: 4px; font-size: 8px; cursor: pointer; white-space: nowrap; }

        .status { font-size: 9px; margin-top: 4px; color: #00ff00; height: 12px; font-weight: bold; text-align: center; flex-shrink: 0; }

        /* المودالات المتجاوبة مع الحجم الصغير */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100; padding: 10px; }
        .modal-content { background: #1a1a1a; padding: 10px; border-radius: 6px; width: 100%; max-width: 190px; border: 1px solid #00ff00; }
        input, textarea { width: 100%; background: #000; color: #00ff00; border: 1px solid #333; border-radius: 4px; padding: 6px; font-size: 11px; box-sizing: border-box; margin-bottom: 6px; }
        .modal-btns { display: flex; gap: 4px; }
        .m-btn { flex: 1; padding: 6px; border-radius: 4px; border: none; cursor: pointer; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-row">
        <a href="/" class="nav-btn">🏠 <span id="homeTxt">الرئيسية</span></a>
        <button class="add-main-btn" onclick="openSectionModal()">+ قسم</button>
        <button class="nav-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </div>

    <div id="main-content" class="content-scroll"></div>

    <div class="backup-row">
        <button class="backup-btn" onclick="exportData()">💾 نسخة</button>
        <button class="backup-btn" onclick="document.getElementById('importFile').click()">📂 استيراد</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div id="status" class="status">جاهز..</div>
</div>

<!-- Modal التعديل وإضافة العناصر -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <input type="text" id="itemName" placeholder="اسم المختصر">
        <textarea id="itemText" placeholder="النص الكامل..." rows="3"></textarea>
        <div class="modal-btns">
            <button class="m-btn" style="background:#00ff00;color:#000" onclick="saveItem()">حفظ</button>
            <button class="m-btn" style="background:#333;color:#fff" onclick="closeModal()">إلغاء</button>
        </div>
        <button id="delItemBtn" style="background:none;border:none;color:#ff4444;width:100%;margin-top:6px;cursor:pointer;font-size:10px; display:none;" onclick="deleteItem()">حذف 🗑️</button>
    </div>
</div>

<!-- Modal إضافة قسم -->
<div class="modal" id="sectionModal">
    <div class="modal-content">
        <input type="text" id="sectionName" placeholder="اسم القسم الجديد">
        <div class="modal-btns">
            <button class="m-btn" style="background:#00ff00;color:#000" onclick="addSection()">إضافة</button>
            <button class="m-btn" style="background:#333;color:#fff" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
    let currentLang = 'ar';
    let activeId = null, activeCat = null;
    const defaultData = { ar: { "عام": [{ id: 1, l: 'ترحيب', t: 'أهلاً بك، كيف أخدمك؟' }] }, en: { "General": [{ id: 2, l: 'Hello', t: 'How can I help you?' }] } };

    let storageData = JSON.parse(localStorage.getItem('copyGridDataV5')) || defaultData;

    function render() {
        const container = document.getElementById('main-content');
        container.innerHTML = '';
        const isAr = currentLang === 'ar';
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
        document.getElementById('homeTxt').innerText = isAr ? 'الرئيسية' : 'Home';

        const sections = storageData[currentLang] || {};
        for (let cat in sections) {
            const secHeader = document.createElement('div');
            secHeader.className = 'section-header';
            secHeader.innerHTML = `
                <div><span class="del-section" onclick="deleteSection('${cat}')">×</span> <span class="section-label">${cat}</span></div>
                <span style="color:#00ff00;cursor:pointer;font-weight:bold;font-size:12px" onclick="openItemModal('${cat}')">+</span>
            `;
            container.appendChild(secHeader);

            const grid = document.createElement('div');
            grid.className = 'grid-container';
            sections[cat].forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerText = item.l;
                chip.title = isAr ? "نقرة واحدة للنسخ | نقرة يمين للتعديل" : "One click to copy | Right click to edit";
                
                // حدث النسخ بنقرة واحدة
                chip.onclick = () => { 
                    navigator.clipboard.writeText(item.t); 
                    showStatus(isAr ? "تم النسخ! ✅" : "Copied! ✅"); 
                };
                
                // حدث التعديل بنقرة الفأرة اليمين
                chip.oncontextmenu = (e) => { 
                    e.preventDefault(); 
                    openItemModal(cat, item); 
                };
                
                grid.appendChild(chip);
            });
            container.appendChild(grid);
        }
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (x) => {
            try {
                const imported = JSON.parse(x.target.result);
                ['ar', 'en'].forEach(lang => {
                    if (imported[lang]) {
                        if (!storageData[lang]) storageData[lang] = {};
                        for (let cat in imported[lang]) {
                            if (!storageData[lang][cat]) storageData[lang][cat] = [];
                            
                            // إصلاح وتأمين استخراج الأسماء الموجودة مسبقاً لتجنب الـ undefined
                            let existing = storageData[lang][cat].map(i => i.l);
                            
                            imported[lang][cat].forEach(newItem => {
                                let finalLabel = newItem.l;
                                let c = 1;
                                while (existing.includes(finalLabel)) {
                                    finalLabel = `${newItem.l} (${lang === 'ar' ? 'نسخة' : 'Copy'} ${c})`;
                                    c++;
                                }
                                storageData[lang][cat].push({ id: Date.now() + Math.random(), l: finalLabel, t: newItem.t });
                                existing.push(finalLabel); // تحديث القائمة محلياً أثناء الحلقة
                            });
                        }
                    }
                });
                saveAndRefresh();
                showStatus(currentLang === 'ar' ? "تم الدمج! 📂" : "Imported! 📂");
            } catch (err) { alert(currentLang === 'ar' ? "خطأ في صيغة الملف!" : "Invalid file format!"); }
        };
        reader.readAsText(file);
        e.target.value = ''; // إعادة تعيين الحقل لتمكين استيراد نفس الملف لاحقاً
    }

    function showStatus(msg) {
        const s = document.getElementById('status');
        s.innerText = msg;
        setTimeout(() => s.innerText = (currentLang === 'ar' ? "جاهز.." : "Ready.."), 1500);
    }

    function openSectionModal() { 
        document.getElementById('sectionName').value = '';
        document.getElementById('sectionModal').style.display = 'flex'; 
    }
    
    function addSection() {
        const name = document.getElementById('sectionName').value.trim();
        if (name) { 
            if (!storageData[currentLang][name]) {
                storageData[currentLang][name] = []; 
                saveAndRefresh(); 
            }
            closeModal(); 
        }
    }
    
    function deleteSection(cat) { 
        const msg = currentLang === 'ar' ? `حذف قسم "${cat}"؟` : `Delete section "${cat}"?`;
        if (confirm(msg)) { delete storageData[currentLang][cat]; saveAndRefresh(); } 
    }

    function openItemModal(cat, item = null) {
        activeCat = cat; 
        activeId = item ? item.id : null;
        document.getElementById('itemName').value = item ? item.l : '';
        document.getElementById('itemText').value = item ? item.t : '';
        
        // إظهار أو إخفاء زر الحذف بناءً على حالة العنصر (جديد أم تعديل)
        document.getElementById('delItemBtn').style.display = item ? 'block' : 'none';
        document.getElementById('editModal').style.display = 'flex';
    }
    
    function saveItem() {
        const l = document.getElementById('itemName').value.trim(), t = document.getElementById('itemText').value.trim();
        if (!l || !t) return;
        if (activeId) { 
            let i = storageData[currentLang][activeCat].find(x => x.id === activeId); 
            if(i) { i.l = l; i.t = t; }
        } else { 
            storageData[currentLang][activeCat].push({ id: Date.now(), l, t }); 
        }
        saveAndRefresh(); closeModal();
    }
    
    function deleteItem() { 
        const msg = currentLang === 'ar' ? 'هل أنت متأكد من الحذف؟' : 'Are you sure you want to delete?';
        if (confirm(msg)) { 
            storageData[currentLang][activeCat] = storageData[currentLang][activeCat].filter(x => x.id !== activeId); 
            saveAndRefresh(); closeModal(); 
        } 
    }

    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function saveAndRefresh() { localStorage.setItem('copyGridDataV5', JSON.stringify(storageData)); render(); }
    function toggleLang() { currentLang = (currentLang === 'ar' ? 'en' : 'ar'); render(); }
    
    function exportData() {
        const blob = new Blob([JSON.stringify(storageData, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `backup_${Date.now()}.json`;
        a.click();
    }

    render();
</script>
</body>
</html>
