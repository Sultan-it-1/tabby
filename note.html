<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Copy Pro - With Home</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #eee; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 350px; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 8px 20px rgba(0,0,0,0.6); display: flex; flex-direction: column; max-height: 90vh; }
        
        /* الهيدر مع الأزرار الجديدة */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0; gap: 5px; }
        
        .nav-btn { background: #252525; border: 1px solid #444; color: #00ff00; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 4px; text-decoration: none; transition: 0.2s; }
        .nav-btn:hover { border-color: #00ff00; background: #122212; }

        .add-main-btn { background: #00ff0011; border: 1px solid #00ff00; color: #00ff00; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }

        .content-scroll { flex-grow: 1; overflow-y: auto; padding-left: 5px; margin-top: 5px; }
        .content-scroll::-webkit-scrollbar { width: 3px; }
        .content-scroll::-webkit-scrollbar-thumb { background: #333; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 12px 0 6px; border-right: 2px solid #00ff00; padding-right: 8px; }
        [dir="ltr"] .section-header { border-right: none; border-left: 2px solid #00ff00; padding-left: 8px; }
        .section-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; }
        .del-section { color: #ff4444; cursor: pointer; font-size: 12px; margin-left: 5px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .chip { background: #222; padding: 10px 4px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid #333; color: #ccc; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chip:hover { border-color: #00ff00; color: #fff; background: #2a2a2a; }

        .backup-row { display: flex; gap: 5px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; }
        .backup-btn { flex: 1; background: #111; border: 1px solid #444; color: #888; padding: 5px; border-radius: 4px; font-size: 9px; cursor: pointer; }

        .status { font-size: 11px; margin-top: 8px; color: #00ff00; height: 15px; font-weight: bold; text-align: center; }

        /* مودالات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-content { background: #1a1a1a; padding: 15px; border-radius: 8px; width: 100%; max-width: 280px; border: 1px solid #00ff00; }
        input, textarea { width: 100%; background: #000; color: #00ff00; border: 1px solid #333; border-radius: 4px; padding: 10px; font-size: 13px; box-sizing: border-box; margin-bottom: 10px; }
        .modal-btns { display: flex; gap: 8px; }
        .m-btn { flex: 1; padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-row">
        <!-- زر الهوم - غير الرابط إلى رابط موقعك الحقيقي -->
        <a href="/" class="nav-btn">🏠 <span id="homeTxt">الرئيسية</span></a>
        
        <button class="add-main-btn" onclick="openSectionModal()">+ قسم</button>
        
        <button class="nav-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </div>

    <div id="main-content" class="content-scroll"></div>

    <div class="backup-row">
        <button class="backup-btn" onclick="exportData()">💾 تصدير نسخة</button>
        <button class="backup-btn" onclick="document.getElementById('importFile').click()">📂 استيراد ودمج</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div id="status" class="status">جاهز..</div>
</div>

<!-- Modal التعديل -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <input type="text" id="itemName" placeholder="اسم المختصر">
        <textarea id="itemText" placeholder="النص الكامل..."></textarea>
        <div class="modal-btns">
            <button class="m-btn" style="background:#00ff00;color:#000" onclick="saveItem()">حفظ</button>
            <button class="m-btn" style="background:#333;color:#fff" onclick="closeModal()">إلغاء</button>
        </div>
        <button style="background:none;border:none;color:#ff4444;width:100%;margin-top:10px;cursor:pointer;font-size:11px;" onclick="deleteItem()">حذف النوتة 🗑️</button>
    </div>
</div>

<!-- Modal إضافة قسم -->
<div class="modal" id="sectionModal">
    <div class="modal-content">
        <input type="text" id="sectionName" placeholder="اسم القسم الجديد">
        <div class="modal-btns">
            <button class="m-btn" style="background:#00ff00;color:#000" onclick="addSection()">إضافة</button>
            <button class="m-btn" style="background:#333;color:#fff" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
    let currentLang = 'ar';
    let activeId = null, activeCat = null;
    const defaultData = { ar: { "عام": [{ id: 1, l: 'ترحيب', t: 'أهلاً بك، كيف أخدمك؟' }] }, en: { "General": [{ id: 2, l: 'Hello', t: 'How can I help you?' }] } };

    let storageData = JSON.parse(localStorage.getItem('copyGridDataV5')) || defaultData;

    function render() {
        const container = document.getElementById('main-content');
        container.innerHTML = '';
        const isAr = currentLang === 'ar';
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
        document.getElementById('homeTxt').innerText = isAr ? 'الرئيسية' : 'Home';

        const sections = storageData[currentLang];
        for (let cat in sections) {
            const secHeader = document.createElement('div');
            secHeader.className = 'section-header';
            secHeader.innerHTML = `
                <div><span class="del-section" onclick="deleteSection('${cat}')">×</span> <span class="section-label">${cat}</span></div>
                <span style="color:#00ff00;cursor:pointer;font-weight:bold" onclick="openItemModal('${cat}')">+</span>
            `;
            container.appendChild(secHeader);

            const grid = document.createElement('div');
            grid.className = 'grid-container';
            sections[cat].forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerText = item.l;
                chip.onclick = () => { navigator.clipboard.writeText(item.t); showStatus("تم النسخ! ✅"); };
                chip.oncontextmenu = (e) => { e.preventDefault(); openItemModal(cat, item); };
                grid.appendChild(chip);
            });
            container.appendChild(grid);
        }
    }

    // --- منطق الاستيراد والدمج الذكي ---
    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (x) => {
            try {
                const imported = JSON.parse(x.target.result);
                ['ar', 'en'].forEach(lang => {
                    if (imported[lang]) {
                        for (let cat in imported[lang]) {
                            if (!storageData[lang][cat]) storageData[lang][cat] = [];
                            imported[lang][cat].forEach(newItem => {
                                let finalLabel = newItem.l;
                                let existing = storageData[lang][cat].map(i => i.l);
                                let c = 1;
                                while (existing.includes(finalLabel)) {
                                    finalLabel = `${newItem.l} (${lang === 'ar' ? 'نسخة' : 'Copy'} ${c})`;
                                    c++;
                                }
                                storageData[lang][cat].push({ id: Date.now() + Math.random(), l: finalLabel, t: newItem.t });
                            });
                        }
                    }
                });
                saveAndRefresh();
                showStatus("تم الدمج بنجاح! 📂");
            } catch (err) { alert("خطأ في الملف!"); }
        };
        reader.readAsText(file);
    }

    function showStatus(msg) {
        const s = document.getElementById('status');
        s.innerText = msg;
        setTimeout(() => s.innerText = "جاهز..", 1500);
    }

    function openSectionModal() { document.getElementById('sectionModal').style.display = 'flex'; }
    function addSection() {
        const name = document.getElementById('sectionName').value.trim();
        if (name) { storageData[currentLang][name] = []; saveAndRefresh(); closeModal(); }
    }
    function deleteSection(cat) { if (confirm(`حذف قسم "${cat}"؟`)) { delete storageData[currentLang][cat]; saveAndRefresh(); } }

    function openItemModal(cat, item = null) {
        activeCat = cat; activeId = item ? item.id : null;
        document.getElementById('itemName').value = item ? item.l : '';
        document.getElementById('itemText').value = item ? item.t : '';
        document.getElementById('editModal').style.display = 'flex';
    }
    function saveItem() {
        const l = document.getElementById('itemName').value, t = document.getElementById('itemText').value;
        if (!l || !t) return;
        if (activeId) { let i = storageData[currentLang][activeCat].find(x => x.id === activeId); i.l = l; i.t = t; }
        else { storageData[currentLang][activeCat].push({ id: Date.now(), l, t }); }
        saveAndRefresh(); closeModal();
    }
    function deleteItem() { if (confirm('حذف؟')) { storageData[currentLang][activeCat] = storageData[currentLang][activeCat].filter(x => x.id !== activeId); saveAndRefresh(); closeModal(); } }

    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function saveAndRefresh() { localStorage.setItem('copyGridDataV5', JSON.stringify(storageData)); render(); }
    function toggleLang() { currentLang = (currentLang==='ar'?'en':'ar'); render(); }
    function exportData() {
        const blob = new Blob([JSON.stringify(storageData, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `backup_${Date.now()}.json`;
        a.click();
    }

    render();
</script>
</body>
</html>
